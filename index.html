<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Lagokefalos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container"></div>

  <!-- Mobile controls (εμφανίζονται μόνο σε mobile mode, μέσα στα safe areas) -->
  <div id="mobile-controls" class="hidden">
    <div id="joystick-zone"></div>
    <button id="jump-btn" aria-label="Jump">▲</button>
  </div>

  <!-- Rotate prompt για portrait -->
  <div id="rotate-overlay">
    <div class="rotate-inner">
      <div class="rotate-icon">⟳</div>
      <p>Γύρνα τη συσκευή σου οριζόντια</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.10.2/dist/nipplejs.min.js"></script>

  <script src="js/sfx.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/scenes/BootScene.js"></script>
  <script src="js/scenes/MenuScene.js"></script>
  <script src="js/scenes/GameScene.js"></script>
  <script src="js/scenes/GameOverScene.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
